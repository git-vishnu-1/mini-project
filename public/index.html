<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Internship Tracker - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <span class="brand-mark">IT</span>
          <span class="brand-text">Internship Tracker</span>
        </div>
      </header>
      <main class="app-main">
        <section class="card auth-card">
          <h1 class="card-title">Welcome</h1>
          <p class="card-subtitle">Sign in or create a student account</p>
          <div class="tabs">
            <button class="tab active" data-tab="login">Login</button>
            <button class="tab" data-tab="register">Student Register</button>
          </div>
          <div class="tab-content" id="login-tab">
            <form id="login-form" class="form">
              <div class="form-group">
                <label for="login-email">Email</label>
                <input id="login-email" type="email" required />
              </div>
              <div class="form-group">
                <label for="login-password">Password</label>
                <input id="login-password" type="password" required />
              </div>
              <button type="submit" class="btn primary w-100">Login</button>
              <p class="hint">Use your college email for students, or assigned email for staff.</p>
            </form>
          </div>
          <div class="tab-content hidden" id="register-tab">
            <form id="register-form" class="form">
              <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input id="reg-name" type="text" required />
              </div>
              <div class="form-group">
                <label for="reg-email">CEA Email</label>
                <input id="reg-email" type="email" required placeholder="name@cea.ac.in" />
              </div>
              <div class="form-group">
                <label for="reg-password">Password</label>
                <input id="reg-password" type="password" required minlength="6" />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="reg-dept">Department</label>
                  <select id="reg-dept" required>
                    <option value="">Select</option>
                    <option value="CSE">CSE</option>
                    <option value="EEE">EEE</option>
                    <option value="ECE">ECE</option>
                    <option value="MECH">MECH</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="reg-year">Year</label>
                  <select id="reg-year" required>
                    <option value="">Select</option>
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn primary w-100">Register</button>
              <p class="hint">
                After email OTP verification, your account will be approved by the system admin before you can log in.
              </p>
            </form>
            <form id="otp-form" class="form hidden">
              <div class="form-group">
                <label for="otp-code">Enter OTP sent to your email</label>
                <input id="otp-code" type="text" required maxlength="6" />
              </div>
              <button type="submit" class="btn primary w-100">Verify OTP</button>
            </form>
          </div>
          <div id="auth-message" class="message hidden"></div>
        </section>
      </main>
    </div>
    <script src="js/auth.js"></script>
  </body>
  </html>
