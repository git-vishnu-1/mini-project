<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Principal Dashboard - Internship Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <span class="brand-mark">IT</span>
          <span class="brand-text">Internship Tracker</span>
        </div>
        <div class="header-actions">
          <span id="principal-name" class="chip"></span>
          <button id="logout-btn" class="btn ghost">Logout</button>
        </div>
      </header>
      <main class="app-main">
        <section class="layout">
          <div class="layout-main">
            <div class="toolbar">
              <h1>College Overview</h1>
              <button id="export-college-csv" class="btn ghost">Download CSV</button>
            </div>
            <div class="card">
              <table class="table" id="college-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Class</th>
                    <th>Latest Status</th>
                    <th>Company</th>
                    <th>Role</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
          <aside class="layout-side">
            <div class="card">
              <h2 class="card-title">Status Breakdown</h2>
              <canvas id="collegeStatusChart"></canvas>
            </div>
          </aside>
        </section>
      </main>
    </div>
    <script src="js/principal-dashboard.js"></script>
  </body>
  </html>
